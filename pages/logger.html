<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Logger - KisanCarbon</title>

  <link rel="stylesheet" href="css/global.css" />
  <link rel="stylesheet" href="css/logger.css" />
</head>
<body>

  <header class="topbar">
    <h1>KisanCarbon Logger</h1>
    <p>Track your farm activity and estimate carbon footprint</p>
  </header>

  <nav class="navbar">
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="history.html">History</a>
    <a href="tips.html">Tips</a>
  </nav>

  <main class="logger-container">

    <section class="form-card">
      <h2>Farm Activity Entry</h2>

      <form id="loggerForm">

        <div class="form-group">
          <label for="farmerName">Farmer Name</label>
          <input type="text" id="farmerName" placeholder="Enter farmer name" />
        </div>

        <div class="form-group">
          <label for="date">Date</label>
          <input type="date" id="date" />
        </div>

        <div class="form-group">
          <label for="acres">Land Area (Acres)</label>
          <input type="number" id="acres" placeholder="Enter acres" />
        </div>

        <div class="form-group">
          <label for="urea">Urea Used (kg)</label>
          <input type="number" id="urea" placeholder="Enter urea quantity" />
        </div>

        <div class="form-group">
          <label for="dap">DAP Used (kg)</label>
          <input type="number" id="dap" placeholder="Enter DAP quantity" />
        </div>

        <div class="form-group">
          <label for="diesel">Diesel Used (litres)</label>
          <input type="number" id="diesel" placeholder="Enter diesel used" />
        </div>

        <div class="form-group">
          <label for="pumpHours">Pump Usage (hours)</label>
          <input type="number" id="pumpHours" placeholder="Enter pump hours" />
        </div>

        <div class="form-group">
          <label for="irrigation">Irrigation Type</label>
          <select id="irrigation">
            <option value="">Select irrigation type</option>
            <option value="flood">Flood Irrigation</option>
            <option value="drip">Drip Irrigation</option>
            <option value="sprinkler">Sprinkler Irrigation</option>
          </select>
        </div>

        <button type="button" class="save-btn">Save Entry</button>
      </form>
    </section>

    <section class="preview-card">
      <h2>Estimated CO₂ Preview</h2>
      <div class="co2-box">
        <p>Total Emission</p>
        <h3 id="co2Preview">0.00 kg CO₂</h3>
      </div>

      <div class="note-box">
        <p>This preview will update when we add calculation logic.</p>
      </div>
    </section>

    <div id="successMessage" class="success-message">
      Entry saved successfully!
    </div>

  </main>

  <script src="js/logger.js"></script>
</body>
</html>
